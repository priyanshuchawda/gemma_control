name: 🐛 Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open the app
        2. Tap the mic button
        3. Say "read my latest messages"
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or logs.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Voice Assistant (mic / speech recognition)
        - Notification Capture (WhatsApp listener)
        - Reply Execution (sending reply)
        - Settings & Permissions
        - On-Device AI (Gemma / LiteRT)
        - UI / Navigation
        - Other
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device & Android version
      placeholder: "e.g. Redmi 13 / HyperOS 2 / Android 14"
    validations:
      required: true

  - type: input
    id: apk_version
    attributes:
      label: APK version / git commit
      placeholder: "e.g. debug build 2026-05-28"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logcat output
      description: Paste any relevant logs here (adb logcat | grep GemmaControl)
      render: shell
