# ──────────────────────────────────────────────────────────────────────────────
# deploy-website.yml
#
# Automatically deploys the GemmaControl download website to Vercel on every
# push to `main` that touches the website source.
#
# Required GitHub secrets (set via `gh secret set`):
#   VERCEL_TOKEN       — Vercel personal access token
#   VERCEL_ORG_ID      — Vercel team/org ID  (team_P7SCl7INEJcPhkkmd9dSaxFu)
#   VERCEL_PROJECT_ID  — Vercel project ID   (prj_9sfOGzi2HxpfuEQjoR6Uknszpfwh)
#
# Jobs:
#   build-and-deploy  — TypeScript compile → verify → Vercel production deploy
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy Website → Vercel

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
  workflow_dispatch:          # Allow manual trigger from GitHub UI

concurrency:
  group: vercel-production
  cancel-in-progress: false   # Never cancel an in-progress production deploy

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    name: Build & Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: website

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Node.js setup ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Type-check ────────────────────────────────────────────────────────
      - name: TypeScript type-check
        run: npm run typecheck

      # ── 5. Build & verify ────────────────────────────────────────────────────
      - name: Build website
        run: npm run build

      # ── 6. Install Vercel CLI ────────────────────────────────────────────────
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ── 7. Pull Vercel environment & project settings ────────────────────────
      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 8. Build on Vercel (uses vercel.json config) ─────────────────────────
      - name: Build on Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 9. Deploy prebuilt output to production ───────────────────────────────
      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 10. Print deployment URL ──────────────────────────────────────────────
      - name: Print deployment URL
        run: echo "🚀 Deployed to ${{ steps.deploy.outputs.deployment_url }}"
